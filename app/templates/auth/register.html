{% extends "base.html" %}
{% block title %}Register — BloodLink{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="brand-icon">
        <i class="bi bi-droplet-fill"></i>
      </div>
      <h1>BloodLink</h1>
      <p>Create your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
      <div class="mb-3">
        <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="full_name" name="full_name" class="form-control"
                 placeholder="John Doe" required />
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email address <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="your@email.com" required />
        </div>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-telephone"></i></span>
          <input type="tel" id="phone" name="phone" class="form-control"
                 placeholder="+91 98765 43210" />
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Min. 8 characters" required minlength="8" />
        </div>
        <div class="form-text" style="color: var(--text-muted); font-size: 0.75rem; margin-top: 4px;">
          Must be at least 8 characters
        </div>
      </div>

      <div class="mb-4">
        <label for="confirm_password" class="form-label">Confirm Password <span class="text-danger">*</span></label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                 placeholder="••••••••" required />
        </div>
      </div>

      <button type="submit" id="registerBtn" class="btn btn-primary w-100 py-2">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
    </form>

    <hr style="border-color: var(--border); margin: 24px 0;" />

    <p class="text-center mb-0" style="color: var(--text-muted); font-size: 0.875rem;">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" style="color: var(--primary-light); text-decoration: none; font-weight: 600;">
        Sign in
      </a>
    </p>
  </div>
</div>
{% endblock %}
