{% extends "base.html" %}
{% block title %}Login — BloodLink{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <div class="brand-icon">
        <i class="bi bi-droplet-fill"></i>
      </div>
      <h1>BloodLink</h1>
      <p>Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="your@email.com" required autocomplete="email" />
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="••••••••" required autocomplete="current-password" />
          <button class="btn btn-outline-secondary" type="button" id="togglePassword" title="Show/hide password">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" id="loginBtn" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <hr style="border-color: var(--border); margin: 24px 0;" />

    <p class="text-center mb-0" style="color: var(--text-muted); font-size: 0.875rem;">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" style="color: var(--primary-light); text-decoration: none; font-weight: 600;">
        Register here
      </a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const toggle = document.getElementById('togglePassword');
  const pwInput = document.getElementById('password');
  toggle?.addEventListener('click', () => {
    const isText = pwInput.type === 'text';
    pwInput.type = isText ? 'password' : 'text';
    toggle.querySelector('i').className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
  });
</script>
{% endblock %}
